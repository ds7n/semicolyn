#
# XcodeGen manifest for the Neotilde iOS app target. SwiftPM can't produce an iOS
# .app bundle, so the app lives here; `xcodegen generate` (macOS) emits the
# .xcodeproj. The Rust SSH core is linked via the local SwiftPM package's
# NeotildeSSHCoreFFI product (backed by NeotildeSSHCore.xcframework, built first by
# scripts/build-xcframework.sh). The terminal renderer is SwiftTerm.
name: Neotilde

options:
  bundleIdPrefix: com.truepositive
  deploymentTarget:
    iOS: "17.0"

packages:
  # The repo-root SwiftPM package (NeotildeKit + the macOS/iOS-only NeotildeSSHCoreFFI).
  NeotildePackage:
    path: .
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.0.0"

targets:
  Neotilde:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: NeotildePackage
        product: NeotildeSSHCoreFFI
      - package: NeotildePackage
        product: NeotildeKit
      - package: SwiftTerm
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.truepositive.neotilde
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # MVP: Swift 5 language mode for the app target. The UniFFI callback
        # bridges + SwiftTerm aren't Swift-6 strict-concurrency clean; tighten later.
        SWIFT_VERSION: "5.0"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # No signing in CI; the simulator build is the gate.
        CODE_SIGNING_ALLOWED: NO
