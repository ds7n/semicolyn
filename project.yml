#
# XcodeGen manifest for the Semicolyn iOS app target. SwiftPM can't produce an iOS
# .app bundle, so the app lives here; `xcodegen generate` (macOS) emits the
# .xcodeproj. The Rust SSH core is linked via the local SwiftPM package's
# SemicolynSSHCoreFFI product (backed by SemicolynSSHCore.xcframework, built first by
# scripts/build-xcframework.sh). The terminal renderer is SwiftTerm.
name: Semicolyn

options:
  bundleIdPrefix: com.truepositive
  deploymentTarget:
    iOS: "17.0"

packages:
  # The repo-root SwiftPM package (SemicolynKit + the macOS/iOS-only SemicolynSSHCoreFFI).
  SemicolynPackage:
    path: .
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.0.0"

targets:
  Semicolyn:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: SemicolynPackage
        product: SemicolynSSHCoreFFI
      - package: SemicolynPackage
        product: SemicolynKit
      - package: SwiftTerm
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.truepositive.semicolyn
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # App icon lives in App/Assets.xcassets/AppIcon.appiconset (single 1024²
        # universal slot). Art is owed before the first TestFlight upload; until
        # then the slot is empty and the asset compiler emits a missing-icon
        # warning on the macOS CI job (non-fatal — simulator builds don't require it).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # MVP: Swift 5 language mode for the app target. The UniFFI callback
        # bridges + SwiftTerm aren't Swift-6 strict-concurrency clean; tighten later.
        SWIFT_VERSION: "5.0"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # No signing in CI; the simulator build is the gate.
        CODE_SIGNING_ALLOWED: NO
