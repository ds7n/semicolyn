#
# XcodeGen manifest for the Semicolyn iOS app target. SwiftPM can't produce an iOS
# .app bundle, so the app lives here; `xcodegen generate` (macOS) emits the
# .xcodeproj. The Rust SSH core is linked via the local SwiftPM package's
# SemicolynSSHCoreFFI product (backed by SemicolynSSHCore.xcframework, built first by
# scripts/build-xcframework.sh). The terminal renderer is SwiftTerm.
name: Semicolyn

options:
  bundleIdPrefix: com.truepositive
  deploymentTarget:
    iOS: "17.0"

packages:
  # The repo-root SwiftPM package (SemicolynKit + the macOS/iOS-only SemicolynSSHCoreFFI).
  SemicolynPackage:
    path: .
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.0.0"

targets:
  Semicolyn:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: SemicolynPackage
        product: SemicolynSSHCoreFFI
      - package: SemicolynPackage
        product: SemicolynKit
      - package: SwiftTerm
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        # Mosh's Network::Compressor uses zlib (_compress/_uncompress). The Mosh
        # xcframework provides the Mosh objects but not zlib; link the iOS SDK's
        # libz here (Mosh's own build gets it via a system -lz).
        OTHER_LDFLAGS: -lz
        PRODUCT_BUNDLE_IDENTIFIER: com.truepositive.semicolyn
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        # App icon lives in App/Assets.xcassets/AppIcon.appiconset (single 1024²
        # universal slot). Art is owed before the first TestFlight upload; until
        # then the slot is empty and the asset compiler emits a missing-icon
        # warning on the macOS CI job (non-fatal — simulator builds don't require it).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # MVP: Swift 5 language mode for the app target. The UniFFI callback
        # bridges + SwiftTerm aren't Swift-6 strict-concurrency clean; tighten later.
        SWIFT_VERSION: "5.0"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # Required for App Store upload since the app targets iPad (device family 1,2).
        # A terminal is comfortable in any orientation; iPhone omits upside-down per norm.
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # SSH/Mosh use ONLY standard, well-known encryption (AES, ChaCha20, curve25519,
        # ed25519) to secure the user's own connections — the classic mass-market /
        # "exempt" case for a terminal client. Declaring NO auto-answers the per-build
        # export-compliance prompt as exempt, so no ITSEncryptionExportComplianceCode is
        # required (a "YES" here 409s the TestFlight upload without a matching code) and
        # no France/ANSSI per-build declaration is triggered. (True Positive LLC asserts
        # the mass-market exemption applies to this standard-crypto usage.)
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        # SSH/mosh to hosts on the LAN (192.168.x, *.local) triggers iOS's Local
        # Network permission prompt; without this string the connection silently
        # fails. Not an App ID capability — a privacy usage string.
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "semicolyn connects to the SSH and Mosh servers you specify."
        # No signing in CI; the simulator build is the gate.
        CODE_SIGNING_ALLOWED: NO
        # The Mosh transport bridge (App/Mosh/MoshSession.mm) is Obj-C++ over
        # Mosh.xcframework; expose it to Swift + set the C++ dialect it needs.
        SWIFT_OBJC_BRIDGING_HEADER: App/Mosh/Semicolyn-Bridging-Header.h
        CLANG_CXX_LANGUAGE_STANDARD: gnu++17

  # macOS-CI-only unit tests for the Obj-C++ MoshSession bridge. STANDALONE — it
  # compiles the real bridge (App/Mosh/MoshSession.mm) + a loopback fake mosh_main
  # (Tests/AppTests/fake_mosh_main.mm) and deliberately does NOT link Mosh.xcframework
  # or the app. The fake is therefore the ONLY `mosh_main` definition (no duplicate-
  # symbol collision with the real network one), and the bridge only needs the
  # `mosh_main` *declaration*, supplied by the vendored header on the search path
  # below. (The app-links-Mosh gate is the separate "Build Semicolyn app" CI step.)
  SemicolynBridgeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/AppTests
      - path: App/Mosh/MoshSession.mm
    settings:
      base:
        CLANG_CXX_LANGUAGE_STANDARD: gnu++17
        CODE_SIGNING_ALLOWED: NO
        # MoshSession.mm's `#if __has_include(<Mosh/moshiosbridge.h>)` falls back to
        # the bare "moshiosbridge.h"; point the compiler at the vendored copy so the
        # declaration resolves without linking the framework binary.
        HEADER_SEARCH_PATHS: $(SRCROOT)/extern/mosh/src/frontend
        # Host-less logic-test bundle: `bundle.unit-test` defaults to no TEST_HOST,
        # so we deliberately do NOT set TEST_HOST (an empty-string value can be
        # misread as "hosted but empty"). The explicit scheme below makes the test
        # action unambiguous + shared for `xcodebuild -scheme SemicolynBridgeTests test`.

# Explicit shared scheme so `xcodebuild -scheme SemicolynBridgeTests test` is
# guaranteed to find a Test action, rather than relying on xcodegen's autogenerated
# per-target scheme (whose sharing + test-wiring for a host-less bundle is the one
# thing we cannot verify without a full macOS CI cycle).
schemes:
  SemicolynBridgeTests:
    build:
      targets:
        SemicolynBridgeTests: [test]
    test:
      targets:
        - SemicolynBridgeTests
