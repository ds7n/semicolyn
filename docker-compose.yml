# Linux fast-loop for Semicolyn's platform-agnostic tier.
#   docker compose build dev
#   docker compose run --rm dev cargo test -p semicolyn-ssh-core
#   docker compose run --rm dev swift test
# Heavy build artifacts live in named volumes so the host bind-mount stays
# source-only; the container runs as the host UID so any lockfiles it writes
# (Cargo.lock / Package.resolved) remain host-editable.
services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: semicolyn-dev
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /work
    # Resolver hardening: glibc's getaddrinfo sends the A and AAAA queries in
    # parallel on one UDP socket. Against Docker's embedded DNS (127.0.0.11)
    # under load, the two near-simultaneous packets hit a Linux conntrack insert
    # race, one reply is dropped, and the lookup fails with EAI_AGAIN
    # ("Temporary failure in name resolution") — the sole cause of flaky
    # linux-rust failures on CI. single-request-reopen serialises A/AAAA so they
    # can't race; the timeout/attempts bump is belt-and-suspenders.
    dns_opt:
      - single-request-reopen
      - timeout:2
      - attempts:3
    environment:
      CARGO_TARGET_DIR: /work/target
      SEMICOLYN_TEST_SSHD: sshd:22
      SEMICOLYN_TEST_SSHD_LEGACY: sshd-legacy:22
    volumes:
      - .:/work
      - cargo-target:/work/target
      - swift-build:/work/.build
      - cargo-registry:/usr/local/cargo/registry
      - testkeys:/testkeys:ro

  # Modern SSH server for host-key / handshake integration tests.
  sshd:
    build:
      context: docker
      dockerfile: Dockerfile.sshd
    image: semicolyn-sshd
    volumes:
      - testkeys:/testkeys
    # Gate readiness on sshd actually listening on :22, not merely on the
    # container process having been launched. `docker compose up -d --wait`
    # blocks until this passes, so the downstream probe never races startup.
    healthcheck:
      # Alpine image: no bash/`/dev/tcp`, but nc is present. -z = scan without
      # sending data; succeeds only once sshd is accepting on :22.
      test: ["CMD", "nc", "-z", "127.0.0.1", "22"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 2s

  # Legacy SSH server that offers only Tier-3 algorithms (Task 3).
  sshd-legacy:
    image: semicolyn-sshd
    command: ["/usr/sbin/sshd", "-D", "-e", "-f", "/etc/ssh/sshd_legacy.conf"]
    volumes:
      - ./docker/sshd-legacy.conf:/etc/ssh/sshd_legacy.conf:ro
      - testkeys:/testkeys
    healthcheck:
      # Alpine image: no bash/`/dev/tcp`, but nc is present. -z = scan without
      # sending data; succeeds only once sshd is accepting on :22.
      test: ["CMD", "nc", "-z", "127.0.0.1", "22"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 2s

volumes:
  cargo-target:
  swift-build:
  cargo-registry:
  testkeys:
