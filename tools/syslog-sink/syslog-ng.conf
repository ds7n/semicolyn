@version: 4.0
# Diagnostics sink for semicolyn's remote log stream (Settings → Diagnostics →
# Stream logs to a server). Accepts RFC 5424 syslog over UDP/TCP (514) and TLS (6514).
# flags(no-parse) keeps the raw message intact (we don't need syslog-ng to re-parse
# the app's own structured line).
source s_net {
    network(transport("udp") port(514));
    network(transport("tcp") port(514) flags(no-parse));
    network(transport("tls") port(6514) flags(no-parse)
        tls(key-file("/etc/syslog-ng/cert/key.pem")
            cert-file("/etc/syslog-ng/cert/cert.pem")
            peer-verify(optional-untrusted)));
};
destination d_file { file("/var/log/semicolyn/semicolyn.log"); };
log { source(s_net); destination(d_file); };
