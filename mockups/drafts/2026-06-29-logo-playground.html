<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>semicolyn — logo color playground</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; padding:32px 36px 80px; font:14px/1.5 -apple-system,"SF Pro Text",Segoe UI,Roboto,sans-serif;
         color:#E8EBF0; background:#07090E; }
  h1 { font-weight:600; font-size:22px; margin:0 0 18px; }
  .wrap { display:flex; gap:44px; flex-wrap:wrap; align-items:flex-start; }
  .stage { position:sticky; top:24px; }
  .preview { width:360px; height:360px; border-radius:22.37%; overflow:hidden;
             box-shadow:0 12px 40px rgba(0,0,0,.5); }
  .preview.square { border-radius:18px; }
  svg.mark { display:block; width:100%; height:100%; }
  .mini { display:flex; gap:18px; margin-top:18px; align-items:flex-end; }
  .mini .m { border-radius:22.37%; overflow:hidden; }
  .opts { margin-top:16px; color:#8A93A3; font-size:12px; display:flex; gap:16px; flex-wrap:wrap; }
  label.ck { display:inline-flex; gap:6px; align-items:center; cursor:pointer; color:#cdd3df; }
  .controls { flex:1; min-width:420px; }
  .panel { border:1px solid #1c2230; border-radius:14px; padding:16px 18px; margin-bottom:18px; }
  .panel h3 { margin:0 0 12px; font-size:13px; text-transform:uppercase; letter-spacing:1px; color:#8A93A3; display:flex; align-items:center; gap:10px;}
  .chip { width:18px; height:18px; border-radius:5px; border:1px solid #333; }
  .pal { margin:8px 0 4px; }
  .pal .lbl { font-size:11px; color:#6b7280; margin:8px 0 5px; text-transform:uppercase; letter-spacing:.6px;}
  .sw { display:flex; flex-wrap:wrap; gap:7px; }
  .sw button { width:30px; height:30px; border-radius:7px; border:2px solid transparent; cursor:pointer; padding:0; }
  .sw button.sel { border-color:#E8EBF0; }
  .row { display:flex; gap:14px; align-items:center; margin-top:12px; flex-wrap:wrap;}
  .row input[type=color]{ width:42px; height:30px; background:none; border:1px solid #333; border-radius:6px; cursor:pointer;}
  .row code{ color:#FFB7A6; }
  input[type=range]{ width:160px; }
  .readout { border:1px solid #1c2230; border-radius:12px; padding:14px 16px; background:#0c0f15;
             font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:13px; color:#9fb0c8; white-space:pre-wrap;}
  .readout b{ color:#FFB7A6; }
  button.copy{ margin-top:10px; background:#161A22; color:#E8EBF0; border:1px solid #2a323f; border-radius:8px; padding:6px 12px; cursor:pointer;}
</style>
</head>
<body>
  <h1>semicolyn — logo color playground</h1>
  <div class="wrap">
    <div class="stage">
      <div class="preview" id="prevBox">
        <svg class="mark" id="mark" viewBox="0 0 2048 2048" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="glowChev" x="-90%" y="-90%" width="280%" height="280%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="40" id="chevBlur" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="glowComma" x="-90%" y="-90%" width="280%" height="280%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="40" id="commaBlur" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <rect id="bg" x="0" y="0" width="2048" height="2048" fill="#12151F"/>
          <g transform="translate(1024.0,784.8) scale(1.0398)">
            <g transform="translate(-1152.4,-1023.6)"><path id="chev" fill="#FFB7A6" d="M 958.5 665.431 C 986.7 665.062 1014.9 664.954 1043.11 665.108 C 1070.21 665.119 1102.42 662.754 1127.64 673.325 C 1154.9 684.746 1171.09 711.797 1188.46 734.306 L 1260.08 828.296 L 1331.12 920.969 C 1349.38 944.486 1368.61 967.294 1385.85 991.572 C 1415.35 1033.1 1381.43 1062.72 1357.62 1093.57 C 1333.08 1125.94 1308.22 1158.06 1283.04 1189.93 C 1254.66 1227.14 1226.02 1264.15 1197.12 1300.96 C 1170.19 1335.38 1155.52 1364.48 1112.25 1379.31 C 1094.94 1383.84 1080.6 1383.17 1062.85 1383.2 L 1007.55 1383.24 C 993.715 1383.25 953.874 1384.38 941.787 1382.55 C 933.724 1381.32 926.074 1378.17 919.48 1373.37 C 900.024 1359.23 893.946 1332.67 906.119 1312.16 C 913.782 1299.25 922.877 1287.92 931.909 1275.98 C 949.112 1253.15 966.575 1230.52 984.293 1208.09 L 1123.38 1026.39 L 982.374 840.397 C 957.724 808.131 932.077 776.925 909.158 743.359 C 889.431 714.467 903.329 678.563 936.31 668.267 C 944.301 665.773 950.23 665.763 958.5 665.431 z"/></g>
            <g transform="translate(-902.6,-568.2)"><path id="comma" fill="#FF6F5E" d="M 734.916 958.456 C 756.316 958.306 777.717 958.296 799.117 958.427 C 812.399 958.466 833.656 957.86 845.855 960.269 C 867.842 964.789 887.168 977.777 899.658 996.428 C 905.727 1005.66 909.788 1016.06 911.574 1026.96 C 913.781 1040.1 913.139 1075.58 912.925 1091.4 C 912.545 1119.4 915.1 1154.62 911.093 1181.87 C 907.563 1202.27 893.858 1217.37 881.846 1233.23 C 841.554 1286.44 789.503 1329.7 734.095 1366.38 C 717.43 1377.42 700.294 1389.16 679.485 1384.76 C 665.022 1378.81 657.256 1368.09 656.732 1352.33 C 655.921 1327.9 672.091 1320.87 690.119 1310.67 C 733.98 1285.85 774.816 1256.07 809.203 1219.13 C 793.675 1219.6 777.951 1219.17 762.417 1219.29 C 728.903 1219.54 702.839 1221.3 676.049 1197.33 C 659.539 1182.48 650.352 1158.33 649.882 1136.39 C 649.289 1108.69 650.332 1080.64 649.831 1052.95 C 649.356 1026.72 654.175 1004.4 672.713 984.843 C 690.901 965.657 709.218 959.42 734.916 958.456 z"/></g>
        </svg>
      </div>
      <div class="mini" id="mini"></div>
      <div class="opts">
        <label class="ck"><input type="checkbox" id="rounded" checked> iOS rounded</label>
        <span>drag sliders / click swatches — updates live</span>
      </div>
    </div>

    <div class="controls">
      <div class="panel" id="p-chev">
        <h3><span class="chip" id="chip-chev"></span> Chevron (top)</h3>
        <div class="row">
          <input type="color" id="col-chev" value="#FFB7A6">
          <code id="hex-chev">#FFB7A6</code>
          <label class="ck"><input type="checkbox" id="glow-chev"> glow</label>
          <input type="range" id="rad-chev" min="0" max="120" value="40">
        </div>
        <div class="pal" data-target="chev"></div>
      </div>

      <div class="panel" id="p-comma">
        <h3><span class="chip" id="chip-comma"></span> Comma (bottom)</h3>
        <div class="row">
          <input type="color" id="col-comma" value="#FF6F5E">
          <code id="hex-comma">#FF6F5E</code>
          <label class="ck"><input type="checkbox" id="glow-comma"> glow</label>
          <input type="range" id="rad-comma" min="0" max="120" value="40">
        </div>
        <div class="pal" data-target="comma"></div>
      </div>

      <div class="panel" id="p-bg">
        <h3><span class="chip" id="chip-bg"></span> Background</h3>
        <div class="row">
          <input type="color" id="col-bg" value="#12151F">
          <code id="hex-bg">#12151F</code>
        </div>
        <div class="pal" data-target="bg"></div>
      </div>

      <div class="readout" id="readout"></div>
      <button class="copy" id="copyBtn">Copy settings</button>
    </div>
  </div>

<script>
const NM = [["coral","#FF6F5E"],["coral hi","#FFB7A6"],["verdigris","#5FB0A2"],["amber","#F5A524"],
  ["crimson","#E5455E"],["text","#E8EBF0"],["term fg","#CFD6E4"],["night","#07090E"],
  ["panel","#0E1118"],["panel hi","#161A24"],["line","#232A3A"],["muted","#8A93A3"]];
const BB = [["bronze","#D49A5C"],["bronze hi","#F2C58A"],["verdigris","#5FA89C"],["amber","#F5A524"],
  ["red","#E06B6B"],["cool dark","#0E1116"],["cool panel","#161A22"],["cool panel hi","#1F2530"],
  ["cool line","#2A323F"],["text","#E8EBF0"],["muted","#8A93A3"]];
const TN = [["blue","#7aa2f7"],["cyan","#7dcfff"],["purple","#bb9af7"],["green","#9ece6a"],
  ["teal","#73daca"],["red","#f7768e"],["orange","#ff9e64"],["yellow","#e0af68"],
  ["fg","#c0caf5"],["bg","#1a1b26"],["storm bg","#24283b"],["comment","#565f89"]];
const BLUE = [["azure","#4f9cf9"],["sky","#6bb6ff"],["cyan","#38bdf8"],["bright cyan","#22d3ee"],
  ["royal","#2f6fed"],["indigo","#6366f1"],["ice","#dbeafe"],["pale","#bfdbfe"],
  ["navy bg","#0a0e1a"],["panel","#0d1530"],["line","#1e2a4a"],["muted","#64748b"]];

const els = {
  chev: document.getElementById('chev'), comma: document.getElementById('comma'),
  bg: document.getElementById('bg'),
  chevBlur: document.getElementById('chevBlur'), commaBlur: document.getElementById('commaBlur'),
};
const state = { chev:"#FFB7A6", comma:"#FF6F5E", bg:"#12151F",
  glowChev:false, glowComma:false, radChev:40, radComma:40 };

function buildPalettes(){
  document.querySelectorAll('.pal').forEach(box=>{
    const tgt = box.dataset.target;
    [["Neon Midnight",NM],["Bell Bronze",BB],["Tokyo Night",TN],["Blue",BLUE]].forEach(([name,pal])=>{
      const lbl=document.createElement('div'); lbl.className='lbl'; lbl.textContent=name; box.appendChild(lbl);
      const row=document.createElement('div'); row.className='sw';
      pal.forEach(([n,hex])=>{
        const b=document.createElement('button'); b.style.background=hex; b.title=n+" "+hex;
        b.onclick=()=>setColor(tgt,hex); row.appendChild(b);
      });
      box.appendChild(row);
    });
  });
}
function setColor(tgt,hex){
  state[tgt]=hex;
  els[tgt].setAttribute('fill',hex);
  document.getElementById('col-'+tgt).value=hex;
  document.getElementById('hex-'+tgt) && (document.getElementById('hex-'+tgt).textContent=hex);
  document.getElementById('chip-'+tgt).style.background=hex;
  if(tgt==='bg') document.getElementById('prevBox').style.background=hex;
  syncSwatchSel(); render();
}
function syncSwatchSel(){
  document.querySelectorAll('.pal').forEach(box=>{
    const tgt=box.dataset.target;
    box.querySelectorAll('.sw button').forEach(b=>{
      b.classList.toggle('sel', rgb(b.style.background)===rgb(state[tgt]));
    });
  });
}
function rgb(c){const d=document.createElement('div');d.style.color=c;document.body.appendChild(d);
  const v=getComputedStyle(d).color;d.remove();return v;}
function render(){
  els.chev.setAttribute('filter', state.glowChev?'url(#glowChev)':'none');
  els.comma.setAttribute('filter', state.glowComma?'url(#glowComma)':'none');
  els.chevBlur.setAttribute('stdDeviation', state.radChev);
  els.commaBlur.setAttribute('stdDeviation', state.radComma);
  updateMini(); readout();
}
function readout(){
  const g=(on,r)=>on?('glow r='+r):'no glow';
  document.getElementById('readout').innerHTML =
    `chevron <b>${state.chev}</b> · ${g(state.glowChev,state.radChev)}\n`+
    `comma   <b>${state.comma}</b> · ${g(state.glowComma,state.radComma)}\n`+
    `bg      <b>${state.bg}</b>`;
}
// live mini previews at small sizes (clone with unique filter ids)
function updateMini(){
  const mini=document.getElementById('mini'); mini.innerHTML='';
  [120,72,48].forEach((sz,i)=>{
    const wrap=document.createElement('div'); wrap.className='m'; wrap.style.width=sz+'px'; wrap.style.height=sz+'px';
    const c=document.getElementById('mark').cloneNode(true);
    c.setAttribute('width',sz); c.setAttribute('height',sz);
    // unique filter ids so clones don't collide
    c.querySelectorAll('filter').forEach(f=>{const id=f.id+'_'+i;
      c.querySelectorAll('[filter="url(#'+f.id+')"]').forEach(e=>e.setAttribute('filter','url(#'+id+')')); f.id=id;});
    wrap.appendChild(c); mini.appendChild(wrap);
  });
}
// wiring
['chev','comma','bg'].forEach(t=>{
  document.getElementById('col-'+t).addEventListener('input',e=>setColor(t,e.target.value));
});
document.getElementById('glow-chev').addEventListener('change',e=>{state.glowChev=e.target.checked;render();});
document.getElementById('glow-comma').addEventListener('change',e=>{state.glowComma=e.target.checked;render();});
document.getElementById('rad-chev').addEventListener('input',e=>{state.radChev=+e.target.value;render();});
document.getElementById('rad-comma').addEventListener('input',e=>{state.radComma=+e.target.value;render();});
document.getElementById('rounded').addEventListener('change',e=>{
  document.getElementById('prevBox').classList.toggle('square',!e.target.checked);});
document.getElementById('copyBtn').addEventListener('click',()=>{
  const t=document.getElementById('readout').innerText; navigator.clipboard&&navigator.clipboard.writeText(t);
  document.getElementById('copyBtn').textContent='Copied ✓'; setTimeout(()=>document.getElementById('copyBtn').textContent='Copy settings',1200);
});
buildPalettes();
setColor('bg','#12151F'); setColor('comma','#FF6F5E'); setColor('chev','#FFB7A6');
render();
</script>
</body>
</html>
